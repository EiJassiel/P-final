# Identificación del proyecto
sonar.projectKey=EiJassiel_P-final
sonar.organization=EiJassiel
sonar.projectName=Tu Proyecto PHP

# URL del servidor de SonarCloud
sonar.host.url=https://sonarcloud.io

# Lenguaje principal
sonar.language=php

# Rutas del código fuente
sonar.sources=.

# Opcional: ruta al reporte de cobertura si usas PHPUnit + cobertura
# Asegúrate de que exista el archivo coverage.xml si activas esto
# sonar.php.coverage.reportPaths=coverage.xml

# Ignorar directorios innecesarios
sonar.exclusions=vendor/**,node_modules/**

# (Opcional) si usas Composer autoload
# sonar.tests=tests
# sonar.test.inclusions=tests/**
